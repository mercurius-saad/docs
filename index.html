<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorbloc API Route Map</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-card: #161b22;
    --bg-input: #0d1117;
    --bg-hover: #1c2128;
    --border: #30363d;
    --border-route: #21262d;
    --text-primary: #fff;
    --text-secondary: #e1e4e8;
    --text-muted: #8b949e;
    --text-path: #c9d1d9;
    --text-placeholder: #484f58;
    --accent: #58a6ff;
    --btn-active: #1f6feb;
    --get-bg: #1a4731; --get-fg: #3fb950;
    --post-bg: #3d2e00; --post-fg: #d29922;
    --put-bg: #0c2d6b; --put-fg: #58a6ff;
    --del-bg: #4a1219; --del-fg: #f85149;
    --signed-bg: #2d1a4e; --signed-fg: #bc8cff;
    --mw-bg: #30363d;
  }
  [data-theme="light"] {
    --bg-primary: #ffffff;
    --bg-card: #f6f8fa;
    --bg-input: #ffffff;
    --bg-hover: #eef1f5;
    --border: #d0d7de;
    --border-route: #e8ebef;
    --text-primary: #1f2328;
    --text-secondary: #1f2328;
    --text-muted: #656d76;
    --text-path: #1f2328;
    --text-placeholder: #a0a8b2;
    --accent: #0969da;
    --btn-active: #0969da;
    --get-bg: #dafbe1; --get-fg: #116329;
    --post-bg: #fff8c5; --post-fg: #7a4f01;
    --put-bg: #ddf4ff; --put-fg: #0550ae;
    --del-bg: #ffebe9; --del-fg: #82071e;
    --signed-bg: #fbefff; --signed-fg: #6639ba;
    --mw-bg: #e8ebef;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-secondary); padding: 32px; transition: background 0.2s, color 0.2s; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
  .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .header-text { flex: 1; }
  .theme-btn { padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted); cursor: pointer; font-size: 18px; line-height: 1; transition: all 0.2s; width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; }
  .theme-btn:hover { color: var(--text-primary); border-color: var(--accent); }
  .legend { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-path); cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: var(--btn-active); border-color: var(--btn-active); color: #fff; }
  .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text-muted); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; }
  .group { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .group:hover { border-color: var(--accent); }
  .group-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .group-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .group-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .group-controller { font-size: 12px; color: var(--text-muted); font-family: 'SF Mono', 'Fira Code', monospace; }
  .group-body { padding: 0; }
  .route { display: flex; align-items: center; padding: 8px 16px; border-bottom: 1px solid var(--border-route); gap: 10px; font-size: 13px; transition: background 0.15s; }
  .route:last-child { border-bottom: none; }
  .route:hover { background: var(--bg-hover); }
  .method { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; min-width: 52px; text-align: center; font-family: 'SF Mono', 'Fira Code', monospace; }
  .method-GET { background: var(--get-bg); color: var(--get-fg); }
  .method-POST { background: var(--post-bg); color: var(--post-fg); }
  .method-PUT { background: var(--put-bg); color: var(--put-fg); }
  .method-DELETE { background: var(--del-bg); color: var(--del-fg); }
  .path { font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text-path); flex: 1; }
  .action { font-size: 12px; color: var(--text-muted); font-family: 'SF Mono', 'Fira Code', monospace; text-align: right; white-space: nowrap; }
  .middleware-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .mw-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--mw-bg); color: var(--text-muted); }
  .mw-tag.auth { background: var(--get-bg); color: var(--get-fg); }
  .mw-tag.public { background: var(--post-bg); color: var(--post-fg); }
  .mw-tag.internal { background: var(--del-bg); color: var(--del-fg); }
  .mw-tag.web-api { background: var(--put-bg); color: var(--put-fg); }
  .mw-tag.signed { background: var(--signed-bg); color: var(--signed-fg); }
  .version-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .version-current { background: var(--get-bg); color: var(--get-fg); }
  .version-legacy { background: var(--post-bg); color: var(--post-fg); }
  .version-web { background: var(--put-bg); color: var(--put-fg); }
  .hidden { display: none !important; }
  .search-box { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-secondary); font-size: 14px; width: 300px; margin-bottom: 24px; outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-placeholder); }
  .toolbar { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; }
</style>
</head>
<body>

<div class="header-row">
  <div class="header-text">
    <h1>Tutorbloc API Route Map</h1>
    <p class="subtitle">Interactive diagram of all API routes, controllers, and middleware</p>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle"></button>
</div>

<div class="stats" id="stats">
  <div class="stat"><div class="stat-num" id="total-routes">0</div><div class="stat-label">Total Routes</div></div>
  <div class="stat"><div class="stat-num" id="total-controllers">0</div><div class="stat-label">Controllers</div></div>
  <div class="stat"><div class="stat-num" id="total-get">0</div><div class="stat-label">GET</div></div>
  <div class="stat"><div class="stat-num" id="total-post">0</div><div class="stat-label">POST</div></div>
  <div class="stat"><div class="stat-num" id="total-put">0</div><div class="stat-label">PUT</div></div>
  <div class="stat"><div class="stat-num" id="total-delete">0</div><div class="stat-label">DELETE</div></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div> GET</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d29922"></div> POST</div>
  <div class="legend-item"><div class="legend-dot" style="background:#58a6ff"></div> PUT</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div> DELETE</div>
  <div class="legend-item"><span class="mw-tag auth">auth:api</span> Authenticated</div>
  <div class="legend-item"><span class="mw-tag public">public</span> No auth</div>
  <div class="legend-item"><span class="mw-tag web-api">web.api</span> Hybrid auth</div>
  <div class="legend-item"><span class="mw-tag internal">internal</span> Admin only</div>
  <div class="legend-item"><span class="mw-tag signed">signed</span> Signed URL</div>
</div>

<div class="toolbar">
  <input type="text" class="search-box" id="search" placeholder="Search routes, controllers, paths..." oninput="filterRoutes()">
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all')">All</button>
    <button class="filter-btn" onclick="setFilter('current')">Current API</button>
    <button class="filter-btn" onclick="setFilter('legacy')">Legacy v1</button>
    <button class="filter-btn" onclick="setFilter('web')">Web</button>
    <button class="filter-btn" onclick="setFilter('public')">Public</button>
    <button class="filter-btn" onclick="setFilter('auth')">Authenticated</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const routeGroups = [
  // ===== CURRENT API (api.php) =====
  {

    version: "current", prefix: "/api/auth",
    routes: [

      { method: "POST", path: "/api/auth/register", action: "RegisterController@register", mw: ["public"] },
      { method: "POST", path: "/api/auth/forgot", action: "ForgotPasswordController@sendResetLinkEmail", mw: ["public"] },
      { method: "DELETE", path: "/api/auth", action: "LoginController@delete", mw: ["auth"] },
    ]
  },
  {
    title: "Users", controller: "UserController",
    version: "current", prefix: "/api/users",
    routes: [

      { method: "GET", path: "/api/users/{username}", action: "UserController@getUserByUsername", mw: ["public"] },
      { method: "GET", path: "/api/users/username/claim/{id}", action: "UserController@claimUsername", mw: ["signed"] },
      { method: "PUT", path: "/api/users/{id}", action: "UserController@update", mw: ["public"] },
    ]
  },
  {

      { method: "GET", path: "/api/bookings/self", action: "BookingController@indexSelf", mw: ["auth"] },

  {
    title: "Availability", controller: "AvailabilityController",
    version: "current", prefix: "/api/availabilites",
    routes: [
      { method: "GET", path: "/api/availabilites", action: "AvailabilityController@index", mw: ["public"] },
    ]
  },
  {
    title: "Lesson Price", controller: "LessonPriceController",
    version: "current", prefix: "/api/lesson-price",
    routes: [
      { method: "GET", path: "/api/lesson-price", action: "LessonPriceController@getLessonPrice", mw: ["public"] },
    ]
  },
  {
    title: "Lesson Locations", controller: "LessonLocationController",
    version: "current", prefix: "/api/lesson-locations",
    routes: [
      { method: "GET", path: "/api/lesson-locations", action: "LessonLocationController@index", mw: ["public"] },
    ]
  },
  {
    title: "Children", controller: "ChildController",
    version: "current", prefix: "/api/children",
    routes: [
      { method: "GET", path: "/api/children", action: "ChildController@all", mw: ["auth"] },
      { method: "POST", path: "/api/children", action: "ChildController@store", mw: ["auth"] },
    ]
  },
  {
    title: "Addresses", controller: "AddressController",
    version: "current", prefix: "/api/addresses",
    routes: [
      { method: "GET", path: "/api/addresses/search", action: "AddressController@searchPostCode", mw: ["public"] },

    ]
  },
  {
    title: "Calendars", controller: "CalendarController",
    version: "current", prefix: "/api/calendars",
    routes: [
      { method: "GET", path: "/api/calendars", action: "CalendarController@all", mw: ["public"] },
      { method: "PUT", path: "/api/calendars/{id}", action: "CalendarController@update", mw: ["public"] },
      { method: "GET", path: "/api/calendars/events", action: "CalendarController@getEvents", mw: ["public"] },
    ]
  },
  {
    title: "Files", controller: "FileController",
    version: "current", prefix: "/api/files",
    routes: [
      { method: "GET", path: "/api/files/{id}", action: "FileController@show", mw: ["public"] },
      { method: "POST", path: "/api/files", action: "FileController@store", mw: ["public"] },
    ]
  },
  {
    title: "Meetings", controller: "MeetingController",
    version: "current", prefix: "/api/meetings",
    routes: [
      { method: "POST", path: "/api/meetings", action: "MeetingController@store", mw: ["public"] },
      { method: "PUT", path: "/api/meetings/{id}", action: "MeetingController@update", mw: ["public"] },
      { method: "DELETE", path: "/api/meetings/{id}", action: "MeetingController@destroy", mw: ["public"] },
    ]
  },
  {
    title: "Social Links", controller: "SocialLinkController",
    version: "current", prefix: "/api/social-links",
    routes: [
      { method: "GET", path: "/api/social-links/self", action: "SocialLinkController@getSelf", mw: ["public"] },

      { method: "DELETE", path: "/api/social-links/{id}", action: "SocialLinkController@destroy", mw: ["public"] },

  // ===== LEGACY v1 API =====

      { method: "POST", path: "/api/v1/auth/register", action: "v1\\Auth\\RegisterController@register", mw: ["public"] },
      { method: "POST", path: "/api/v1/auth/forgot", action: "v1\\Auth\\ForgotPasswordController@sendResetLinkEmail", mw: ["public"] },
      { method: "GET", path: "/api/v1/auth/email/verify/resend", action: "v1\\Auth\\VerificationController@resend", mw: ["public"] },
    ]
  },
  {
    title: "v1 Search", controller: "v1\\SearchController",
    version: "legacy", prefix: "/api/v1/search",
    routes: [
      { method: "POST", path: "/api/v1/search", action: "v1\\SearchController@find", mw: ["public"] },
      { method: "GET", path: "/api/v1/search", action: "v1\\SearchController@find", mw: ["public"] },
    ]
  },
  {
    title: "v1 Users", controller: "v1\\UserController",
    version: "legacy", prefix: "/api/v1/users",

let activeFilter = 'all';

function getMwClass(mw) {
  if (mw === 'auth') return 'auth';
  if (mw === 'public') return 'public';
  if (mw === 'internal') return 'internal';
  if (mw === 'web-api') return 'web-api';
  if (mw === 'signed') return 'signed';
  return '';
}

function render() {
  const grid = document.getElementById('grid');
  const search = document.getElementById('search').value.toLowerCase();
  grid.innerHTML = '';

  let totalRoutes = 0, gets = 0, posts = 0, puts = 0, deletes = 0;
  const controllers = new Set();

  routeGroups.forEach(group => {
    if (activeFilter !== 'all') {
      if (activeFilter === 'current' && group.version !== 'current') return;
      if (activeFilter === 'legacy' && group.version !== 'legacy') return;
      if (activeFilter === 'web' && group.version !== 'web') return;
      if (activeFilter === 'public') {
        const hasPublic = group.routes.some(r => r.mw.includes('public'));
        if (!hasPublic) return;
      }
      if (activeFilter === 'auth') {
        const hasAuth = group.routes.some(r => r.mw.includes('auth'));
        if (!hasAuth) return;
      }
    }

    let filteredRoutes = group.routes;
    if (activeFilter === 'public') filteredRoutes = filteredRoutes.filter(r => r.mw.includes('public'));
    if (activeFilter === 'auth') filteredRoutes = filteredRoutes.filter(r => r.mw.includes('auth'));

    if (search) {
      filteredRoutes = filteredRoutes.filter(r =>
        r.path.toLowerCase().includes(search) ||
        r.action.toLowerCase().includes(search) ||
        r.method.toLowerCase().includes(search) ||
        group.title.toLowerCase().includes(search) ||
        group.controller.toLowerCase().includes(search)
      );
    }

    if (filteredRoutes.length === 0) return;

    controllers.add(group.controller);

    const versionClass = group.version === 'current' ? 'version-current' : group.version === 'legacy' ? 'version-legacy' : 'version-web';
    const versionLabel = group.version === 'current' ? 'Current' : group.version === 'legacy' ? 'Legacy v1' : 'Web';

    let html = `<div class="group">
      <div class="group-header">
        <div>
          <div class="group-title">${group.title}</div>
          <div class="group-controller">${group.controller}</div>
        </div>
        <span class="version-badge ${versionClass}">${versionLabel}</span>
      </div>
      <div class="group-body">`;

    filteredRoutes.forEach(route => {
      totalRoutes++;
      if (route.method === 'GET') gets++;
      if (route.method === 'POST') posts++;
      if (route.method === 'PUT') puts++;
      if (route.method === 'DELETE') deletes++;

      const mwTags = route.mw.map(m => `<span class="mw-tag ${getMwClass(m)}">${m}</span>`).join('');

      html += `<div class="route">
        <span class="method method-${route.method}">${route.method}</span>
        <span class="path">${route.path}</span>
        <div class="middleware-tags">${mwTags}</div>
      </div>`;
    });

    html += '</div></div>';
    grid.innerHTML += html;
  });

  document.getElementById('total-routes').textContent = totalRoutes;
  document.getElementById('total-controllers').textContent = controllers.size;
  document.getElementById('total-get').textContent = gets;
  document.getElementById('total-post').textContent = posts;
  document.getElementById('total-put').textContent = puts;
  document.getElementById('total-delete').textContent = deletes;
}

function setFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function filterRoutes() { render(); }

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateToggleIcon(next);
}

function updateToggleIcon(theme) {
  const btn = document.getElementById('theme-toggle');
  btn.innerHTML = theme === 'dark' ? '&#9788;' : '&#9790;';
}

// Init: use stored preference, else follow system
const saved = localStorage.getItem('theme');
const initial = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', initial);
updateToggleIcon(initial);

render();
</script>
